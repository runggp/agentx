name: agentx

services:
  ralph:
    build:
      context: ${SCAFFOLD:?Set SCAFFOLD=/opt/agentx/scaffold}
      dockerfile: Dockerfile
    env_file: /opt/agentx/secrets.env
    environment:
      WORKSPACE_PATH: /workspace
      RALPH_MAX_ITERATIONS: ${RALPH_MAX_ITERATIONS:-5}
      RALPH_MODE: ${RALPH_MODE:-build}
      RALPH_MODEL: ${RALPH_MODEL:-claude-sonnet-4-6}
      OLLAMA_HOST: http://localhost:11434
    volumes:
      - ${WORKSPACE_PATH:-/opt/agentx}:/workspace
      - /root/.claude:/home/ralph/.claude:ro
      - /root/.ssh:/home/ralph/.ssh:ro
    network_mode: host
    restart: "no"
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "10"

